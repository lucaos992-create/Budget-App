<!DOCTYPE html>

<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Il mio Budget</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <meta name="theme-color" content="#080810" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'SF Pro Display', sans-serif;
      background: #080810; color: #f0f0f8;
      min-height: 100vh;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    #app {
      max-width: 430px; margin: 0 auto;
      padding-bottom: 100px;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .header { padding: 48px 20px 16px; background: linear-gradient(180deg,#16122e 0%,#080810 100%); }
    .header-sub { font-size:11px; color:#5a5a78; letter-spacing:3px; text-transform:uppercase; font-weight:500; margin-bottom:4px; }
    .header-title { font-size:26px; font-weight:700; letter-spacing:-0.5px; }

    .savings-card {
      margin: 0 16px 20px;
      background: linear-gradient(135deg,#312080 0%,#6d28d9 50%,#7c3aed 100%);
      border-radius:22px; padding:22px 22px 18px;
      position:relative; overflow:hidden;
      box-shadow:0 16px 40px rgba(109,40,217,0.4);
    }
    .savings-card::before { content:''; position:absolute; top:-20px; right:-20px; width:100px; height:100px; background:rgba(255,255,255,0.07); border-radius:50%; }
    .savings-card::after  { content:''; position:absolute; bottom:-30px; left:30px; width:70px; height:70px; background:rgba(255,255,255,0.04); border-radius:50%; }
    .savings-label { font-size:11px; opacity:.7; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; font-weight:500; }
    .savings-amount { font-size:44px; font-weight:700; letter-spacing:-1px; margin-bottom:4px; transition:color .4s; }
    .savings-sub { font-size:12px; opacity:.65; margin-bottom:14px; }
    .progress-track { background:rgba(255,255,255,0.18); border-radius:100px; height:6px; margin-bottom:8px; }
    .progress-bar { height:100%; border-radius:100px; transition:width .7s cubic-bezier(.4,0,.2,1), background .4s; }
    .savings-row { display:flex; justify-content:space-between; font-size:11px; opacity:.7; font-variant-numeric:tabular-nums; }

    .tabs { display:flex; gap:8px; padding:0 16px; margin-bottom:16px; }
    .tab-btn { border-radius:100px; padding:7px 18px; font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; border:1px solid #2a2a3a; background:#13131e; color:#6b6b88; }
    .tab-btn.active { background:#6d28d9; border-color:#7c3aed; color:white; }

    #cat-list, #tx-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
    .cat-card { background:#13131e; border:1px solid #1e1e2e; border-radius:16px; padding:14px 16px; }
    .cat-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .cat-left { display:flex; align-items:center; gap:10px; }
    .cat-icon { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
    .cat-name { font-size:14px; font-weight:500; }
    .cat-budget { font-size:11px; color:#555570; margin-top:1px; }
    .cat-amount { font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; }
    .cat-pct { font-size:11px; color:#555570; }
    .bar-track { background:#1e1e2e; border-radius:100px; height:4px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:100px; transition:width .6s cubic-bezier(.4,0,.2,1); }

    #tx-list { gap:8px; }
    .tx-card { background:#13131e; border:1px solid #1e1e2e; border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:12px; }
    .tx-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
    .tx-desc { font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tx-meta { font-size:10px; color:#555570; margin-top:2px; }
    .tx-amount { font-size:14px; font-weight:600; color:#fb923c; font-variant-numeric:tabular-nums; flex-shrink:0; }
    .tx-del { background:none; border:none; color:#3a3a50; cursor:pointer; font-size:14px; padding:4px 2px; flex-shrink:0; }
    .tx-empty { text-align:center; color:#555570; padding:40px 20px; font-size:13px; line-height:1.8; }
    .tx-empty-icon { font-size:32px; margin-bottom:12px; }

    .fab {
      position:fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,#6d28d9,#7c3aed);
      color:white; border:none; border-radius:100px;
      padding:15px 30px; font-size:15px; font-weight:600;
      cursor:pointer; box-shadow:0 8px 28px rgba(109,40,217,0.5);
      display:flex; align-items:center; gap:8px;
      z-index:50; white-space:nowrap; font-family:inherit;
    }

    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(10px); z-index:100; align-items:flex-end; }
    .modal-overlay.open { display:flex; }
    .modal-sheet {
      background:#13131e; border:1px solid #2a2a3a;
      border-radius:24px 24px 0 0;
      padding:20px 20px;
      padding-bottom: calc(44px + env(safe-area-inset-bottom));
      width:100%;
      animation:slideUp .28s cubic-bezier(.4,0,.2,1);
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width:36px; height:4px; background:#2a2a3a; border-radius:100px; margin:0 auto 20px; }
    .modal-title { font-size:18px; font-weight:700; margin-bottom:20px; }
    .field-label { font-size:11px; color:#555570; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; font-weight:500; }
    .field-input, .field-select {
      width:100%; background:#1c1c2e; border:1px solid #2a2a3a;
      border-radius:13px; padding:13px 14px; color:#f0f0f8;
      font-size:15px; outline:none; font-family:inherit;
      transition:border-color .2s; margin-bottom:14px;
      -webkit-appearance:none;
    }
    .field-input.error { border-color:#f87171; }
    .submit-btn { width:100%; background:linear-gradient(135deg,#6d28d9,#7c3aed); color:white; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }
  </style>

</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-sub" id="month-label"></div>
    <div class="header-title">Il mio Budget 💶</div>
  </div>

  <div class="savings-card">
    <div class="savings-label">Risparmio mensile</div>
    <div class="savings-amount" id="savings-amount">€0</div>
    <div class="savings-sub" id="savings-sub"></div>
    <div class="progress-track"><div class="progress-bar" id="savings-bar"></div></div>
    <div class="savings-row">
      <span id="spent-label"></span>
      <span id="income-label"></span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-cats" onclick="switchTab('cats')">Categorie</button>
    <button class="tab-btn" id="tab-txs"  onclick="switchTab('txs')">Movimenti</button>
  </div>

  <div id="cat-list"></div>
  <div id="tx-list" style="display:none"></div>
</div>

<button class="fab" onclick="openModal()">＋ Aggiungi spesa</button>

<div class="modal-overlay" id="modal" onclick="overlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuova spesa</div>
    <div class="field-label">Descrizione</div>
    <input class="field-input" id="f-desc" type="text" placeholder="Es. Supermercato Esselunga" />
    <div class="field-label">Importo (€)</div>
    <input class="field-input" id="f-amount" type="number" inputmode="decimal" placeholder="0" />
    <div class="field-label">Categoria</div>
    <select class="field-select" id="f-cat"></select>
    <button class="submit-btn" onclick="addTx()">Aggiungi</button>
  </div>
</div>

<script>
const INCOME = 5600, TARGET = 1700;
const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const CATS = [
  { id:"mutuo",       label:"Mutuo",            icon:"🏠", budget:500,  color:"#a78bfa", bg:"#2e1f5e" },
  { id:"figli",       label:"Figli",             icon:"👨‍👧", budget:850,  color:"#fb923c", bg:"#431407" },
  { id:"auto",        label:"Auto & Trasporti",  icon:"🚗", budget:550,  color:"#fbbf24", bg:"#3a2e10" },
  { id:"alimentari",  label:"Alimentari & Casa", icon:"🛒", budget:500,  color:"#4ade80", bg:"#052e16" },
  { id:"abbonamenti", label:"Abbonamenti",       icon:"📱", budget:150,  color:"#38bdf8", bg:"#0c2a3a" },
  { id:"svago",       label:"Svago",             icon:"🎭", budget:350,  color:"#e879f9", bg:"#2e1040" },
  { id:"altro",       label:"Altro",             icon:"💳", budget:200,  color:"#94a3b8", bg:"#1e2330" },
];

const KEY = "budget_txs_v1";
let txs = [];

function getMonthKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()}`; }
function fmtEur(n) { return "€" + Math.round(n).toLocaleString("it-IT"); }
function fmtDate(ts) { const d = new Date(ts); return `${d.getDate()}/${d.getMonth()+1}`; }
function load() { try { txs = JSON.parse(localStorage.getItem(KEY)) || []; } catch(_) { txs = []; } }
function save() { try { localStorage.setItem(KEY, JSON.stringify(txs)); } catch(_) {} }

function render() {
  const now = new Date();
  document.getElementById("month-label").textContent = MONTHS[now.getMonth()] + " " + now.getFullYear();
  const mt = txs.filter(t => t.month === getMonthKey());
  const spent = mt.reduce((s,t) => s + t.amount, 0);
  const sav = Math.max(0, INCOME - spent);
  const pct = Math.min(100, (sav / TARGET) * 100);
  const col = pct >= 100 ? "#4ade80" : pct >= 60 ? "#fbbf24" : "#f87171";
  document.getElementById("savings-amount").textContent = fmtEur(sav);
  document.getElementById("savings-amount").style.color = col;
  document.getElementById("savings-sub").textContent = `target ${fmtEur(TARGET)} · ${Math.round(pct)}% raggiunto`;
  const bar = document.getElementById("savings-bar");
  bar.style.width = pct + "%"; bar.style.background = col;
  document.getElementById("spent-label").textContent = "Speso: " + fmtEur(spent);
  document.getElementById("income-label").textContent = "Netto: " + fmtEur(INCOME);

  const cs = {};
  CATS.forEach(c => cs[c.id] = 0);
  mt.forEach(t => { if (cs[t.cat] !== undefined) cs[t.cat] += t.amount; });

  document.getElementById("cat-list").innerHTML = CATS.map(c => {
    const s = cs[c.id] || 0, p = Math.min(100,(s/c.budget)*100);
    const bc = p>=100?"#f87171":p>=80?"#fbbf24":c.color;
    return `<div class="cat-card">
      <div class="cat-row">
        <div class="cat-left">
          <div class="cat-icon" style="background:${c.bg}">${c.icon}</div>
          <div><div class="cat-name">${c.label}</div><div class="cat-budget">Budget: ${fmtEur(c.budget)}</div></div>
        </div>
        <div style="text-align:right">
          <div class="cat-amount" style="color:${bc}">${fmtEur(s)}</div>
          <div class="cat-pct">${Math.round(p)}%</div>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${bc}"></div></div>
    </div>`;
  }).join("");

  const sorted = [...mt].sort((a,b) => b.ts - a.ts);
  document.getElementById("tx-list").innerHTML = sorted.length === 0
    ? `<div class="tx-empty"><div class="tx-empty-icon">
